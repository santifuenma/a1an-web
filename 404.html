<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — A1AN | Safe&Sound Robotics</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1d3253 0%, #2a5c92 60%, #3a7bb8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Animated rings (same as hero) */
    .rings {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(83,178,184,0.18);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite;
    }
    .ring:nth-child(1) { width: 600px; height: 600px; }
    .ring:nth-child(2) { width: 450px; height: 450px; border-color: rgba(83,178,184,0.25); animation-delay: 1s; }
    .ring:nth-child(3) { width: 300px; height: 300px; border-color: rgba(83,178,184,0.35); animation-delay: 2s; }
    @keyframes pulse-ring {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:.6; }
      50%      { transform: translate(-50%,-50%) scale(1.04); opacity:1; }
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      padding: 3.5rem 3rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      z-index: 2;
    }

    .logo {
      width: 52px;
      height: 52px;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }

    .error-code {
      font-size: 7rem;
      font-weight: 800;
      color: #53b2b8;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
      text-shadow: 0 0 60px rgba(83,178,184,0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    p {
      color: rgba(255,255,255,0.65);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #53b2b8;
      color: #ffffff;
    }
    .btn-primary:hover {
      background: #48a0a5;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(83,178,184,0.35);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <div class="card">
    <img src="/assets/logo.png" alt="A1AN" class="logo">
    <div class="error-code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ha sido movida. Puedes volver al inicio o acceder a tu dashboard.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Ir al inicio
      </a>
      <a href="/pages/dashboard.html" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Mi dashboard
      </a>
    </div>
  </div>
</body>
</html>
