<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — A1AN | Safe&Sound Robotics</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=2">
  <link rel="stylesheet" href="/css/auth.css?v=2">
  <link rel="stylesheet" href="/css/responsive.css?v=2">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="/assets/logo.png" alt="Safe&Sound Robotics">
        <span>Safe&Sound</span>
      </a>

      <div class="auth-header">
        <h1>Crear cuenta</h1>
        <p>Regístrate para empezar a usar A1AN</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <form class="auth-form" id="registerForm">
        <div class="auth-row">
          <div class="form-group">
            <label for="firstName">Nombre</label>
            <input type="text" id="firstName" placeholder="Tu nombre" required>
            <span class="form-error" id="firstNameError">El nombre es obligatorio</span>
          </div>
          <div class="form-group">
            <label for="lastName">Apellidos</label>
            <input type="text" id="lastName" placeholder="Tus apellidos" required>
            <span class="form-error" id="lastNameError">Los apellidos son obligatorios</span>
          </div>
        </div>

        <div class="auth-row">
          <div class="form-group">
            <label for="tipoUsuario">Tipo de cuenta</label>
            <select id="tipoUsuario" class="form-select" required style="width: 100%; padding: 0.75rem 1rem; border: var(--border); border-radius: var(--radius-md); background: var(--surface); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; transition: border-color var(--transition), box-shadow var(--transition);">
              <option value="1">Paciente</option>
              <option value="2" disabled>Doctor (Próximamente)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono (Opcional)</label>
            <input type="tel" id="telefono" placeholder="+34 600 000 000">
          </div>
        </div>

        <div class="auth-row">
          <div class="form-group">
            <label for="tipoIdentificacion">Documento (Opcional)</label>
            <select id="tipoIdentificacion" class="form-select" style="width: 100%; padding: 0.75rem 1rem; border: var(--border); border-radius: var(--radius-md); background: var(--surface); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; transition: border-color var(--transition), box-shadow var(--transition);">
              <option value="DNI">DNI</option>
              <option value="NIE">NIE</option>
              <option value="Pasaporte">Pasaporte</option>
            </select>
          </div>
          <div class="form-group">
            <label for="numeroIdentificacion">Número Ident.</label>
            <input type="text" id="numeroIdentificacion" placeholder="p. ej. 12345678A">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
          <span class="form-error" id="emailError">Introduce un correo electrónico válido</span>
        </div>

        <div class="auth-row">
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-toggle">
              <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
              <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="passwordError">Mínimo 6 caracteres</span>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirmar</label>
            <div class="password-toggle">
              <input type="password" id="confirmPassword" placeholder="Confirma tu clave" required>
              <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="confirmPasswordError">Las claves no coinciden</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Crear cuenta</button>
      </form>

      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a href="/pages/login.html">Iniciar sesión</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
