<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — A1AN | Safe&Sound Robotics</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <img src="assets/logo.png" alt="Safe&Sound Robotics">
        <span>Safe&Sound</span>
      </a>

      <div class="auth-header">
        <h1>Recuperar contraseña</h1>
        <p>Introduce tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <form class="auth-form" id="recoverForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
          <span class="form-error" id="emailError">Introduce un correo electrónico válido</span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Enviar enlace de recuperación</button>
      </form>

      <div class="auth-footer">
        <p>¿Recordaste tu contraseña? <a href="login.html">Iniciar sesión</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/auth.js"></script>
</body>
</html>
