<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificaciones — A1AN | Safe&Sound Robotics</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="sidebar-logo">
        <img src="assets/logo.png" alt="Safe&Sound Robotics">
        <span>Safe&Sound</span>
      </a>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <span class="sidebar-section-title">General</span>
          <a href="dashboard.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="robot.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
            Mi robot
          </a>
        </div>
        <div class="sidebar-section">
          <span class="sidebar-section-title">Rehabilitación</span>
          <a href="exercises.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Ejercicios
          </a>
          <a href="activity.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Actividad
          </a>
        </div>
        <div class="sidebar-section">
          <span class="sidebar-section-title">Sistema</span>
          <a href="notifications.html" class="sidebar-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Notificaciones
            <span class="sidebar-badge" id="sidebarNotifBadge">3</span>
          </a>
          <a href="profile.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Perfil
          </a>
          <a href="support.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Ayuda
          </a>
        </div>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarUserName">Usuario</div>
          <div class="sidebar-user-email" id="sidebarUserEmail">user@email.com</div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN -->
    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <button class="topbar-toggle" id="sidebarToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="topbar-breadcrumb">
            <span>Inicio</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="current">Notificaciones</span>
          </div>
        </div>
        <div class="topbar-right">
          <a href="notifications.html" class="topbar-notification">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="topbar-notification-badge" id="topbarNotifBadge"></span>
          </a>
          <a href="profile.html" class="topbar-user">
            <div class="topbar-user-avatar" id="topbarAvatar">U</div>
            <span class="topbar-user-name" id="topbarUserName">Usuario</span>
          </a>
        </div>
      </div>

      <div class="page-content">
        <div class="page-header">
          <h1>Notificaciones</h1>
          <p>Avisos del robot, recordatorios y alertas del sistema.</p>
        </div>

        <div class="notification-filters" id="notifFilters">
          <button class="notification-filter active" data-filter="all">Todas</button>
          <button class="notification-filter" data-filter="unread">No leídas</button>
          <button class="notification-filter" data-filter="alert">Alertas</button>
          <button class="notification-filter" data-filter="reminder">Recordatorios</button>
          <button class="notification-filter" data-filter="system">Sistema</button>
        </div>

        <div class="notification-list" id="notificationList">
          <!-- Populated by JS -->
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/dashboard.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
