<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — A1AN | Safe&Sound Robotics</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <img src="assets/logo.png" alt="Safe&Sound Robotics">
        <span>Safe&Sound</span>
      </a>

      <div class="auth-header">
        <h1>Iniciar sesión</h1>
        <p>Accede a tu panel de control de A1AN</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
          <span class="form-error" id="emailError">Introduce un correo electrónico válido</span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-toggle">
            <input type="password" id="password" placeholder="Tu contraseña" required>
            <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error" id="passwordError">La contraseña es obligatoria</span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Iniciar sesión</button>
      </form>

      <div class="auth-links">
        <a href="recover.html">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="auth-footer">
        <p>¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/auth.js"></script>
</body>
</html>
